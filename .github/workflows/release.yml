name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FRP_VERSION: "0.44.0"
  GO_VERSION: "1.21"

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version
        id: version
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Build all platforms
        run: |
          mkdir -p dist

          # 定义构建矩阵（逗号分隔: goos,goarch,archive）
          targets=(
            "windows,amd64,zip"
            "linux,amd64,tar.gz"
            "linux,arm64,tar.gz"
            "darwin,amd64,tar.gz"
            "darwin,arm64,tar.gz"
          )

          for target in "${targets[@]}"; do
            IFS=',' read -r goos goarch archive <<< "$target"

            # Windows 可执行文件后缀 .exe
            if [ "$goos" = "windows" ]; then ext=".exe"; else ext=""; fi
            name="gradio_share_${goos}_${goarch}"
            pkg_dir="dist/${name}"

            # 交叉编译 Go 二进制
            CGO_ENABLED=0 GOOS=$goos GOARCH=$goarch \
              go build -ldflags="-s -w" -o "${pkg_dir}/gradio_share${ext}" .

            # 下载对应平台的 frpc（Windows 用 zip，其他用 tar.gz）
            frp_pkg="frp_${FRP_VERSION}_${goos}_${goarch}"
            if [ "$goos" = "windows" ]; then
              frp_ext="zip"
            else
              frp_ext="tar.gz"
            fi
            frp_url="https://github.com/fatedier/frp/releases/download/v${FRP_VERSION}/${frp_pkg}.${frp_ext}"
            curl -sL "$frp_url" -o "/tmp/${frp_pkg}.${frp_ext}"

            if [ "$frp_ext" = "zip" ]; then
              unzip -o "/tmp/${frp_pkg}.${frp_ext}" -d /tmp
            else
              tar xzf "/tmp/${frp_pkg}.${frp_ext}" -C /tmp
            fi

            cp "/tmp/${frp_pkg}/frpc${ext}" "${pkg_dir}/frpc${ext}"
            chmod +x "${pkg_dir}/frpc${ext}" 2>/dev/null || true

            # 打包
            if [ "$archive" = "zip" ]; then
              (cd dist && zip -r "${name}.zip" "${name}/")
            else
              (cd dist && tar czf "${name}.tar.gz" "${name}/")
            fi

            echo "✓ ${name}.${archive}"
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: dist/*.zip dist/*.tar.gz
